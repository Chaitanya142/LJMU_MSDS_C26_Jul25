name: smart_fund_advisor
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=1.26.4
  - pandas=2.2.1
  - scikit-learn=1.4.1
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - jupyter=1.0.0
  - jupyterlab=4.1.2
  - ipykernel=6.29.3
  - tqdm=4.66.2
  - pytorch::pytorch          # conda native ARM64 build — do NOT use pip torch
  - pip:
      - flwr==1.7.0            # Flower core — simulation uses manual FedAvg (no ray needed)
      # flwr-datasets removed — not used; FL client data is built from bank CSV directly
      - opacus==1.4.1         # differential privacy for PyTorch
      - imbalanced-learn==0.12.0
      - joblib==1.3.2
      - colorama==0.4.6
