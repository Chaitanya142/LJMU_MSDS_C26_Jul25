name: smart_fund_advisor
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=1.26.4
  - pandas=2.2.1
  - scikit-learn=1.4.1
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - jupyter=1.0.0
  - jupyterlab=4.1.2
  - ipykernel=6.29.3
  - tqdm=4.66.2
  - pytorch::pytorch          # conda native ARM64 build — do NOT use pip torch
  - pip:
      - flwr==1.7.0
      - flwr-datasets==0.0.2
      - opacus==1.4.1         # differential privacy for PyTorch
      - imbalanced-learn==0.12.0
      - joblib==1.3.2
      - colorama==0.4.6
      - xgboost>=2.0.0
      - lightgbm>=4.3.0
      - pyarrow>=15.0.0
      - scipy>=1.12.0
      - openpyxl>=3.1.0       # FundPerf XLSX parsing (benchmark_features.py)
      - google-generativeai>=0.8.0  # Gemini LLM provider (gpt_explainer.py)
      - groq>=0.5.0           # Groq Llama LLM provider (gpt_explainer.py)
      - huggingface-hub>=0.21.0     # HuggingFace Qwen provider (gpt_explainer.py)
      - ipywidgets>=8.1.0     # interactive widgets in notebooks
